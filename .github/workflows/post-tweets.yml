name: Post Tweets - Focus Forward

on:
  schedule:
    # Post 10 times per day at these times (UTC)
    # 10:00 UTC = 6:00 AM EST
    # 12:00 UTC = 8:00 AM EST
    # 14:00 UTC = 10:00 AM EST
    # 16:00 UTC = 12:00 PM EST
    # 18:00 UTC = 2:00 PM EST
    # 20:00 UTC = 4:00 PM EST
    # 22:00 UTC = 6:00 PM EST
    # 00:00 UTC = 8:00 PM EST (next day)
    # 02:00 UTC = 10:00 PM EST
    # 03:30 UTC = 11:30 PM EST
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
    - cron: '0 22 * * *'
    - cron: '0 0 * * *'
    - cron: '0 2 * * *'
    - cron: '30 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Post tweet
      env:
        API_KEY: ${{ secrets.TWITTER_API_KEY }}
        API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      run: |
        python .github/workflows/post_tweet.py
        
    - name: Log result
      if: always()
      run: |
        echo "Tweet posted at $(date)"
